services:
  vme:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./data/input:/app/data/input
      - ./data/output:/app/data/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
